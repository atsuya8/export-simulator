<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>食品輸出価格シミュレーター｜日本→台湾</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 3px; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #2563eb; cursor: pointer; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.25); }
    input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #2563eb; cursor: pointer; border: 2px solid #fff; }
    .tooltip-container { position: relative; display: inline-block; }
    .tooltip-box { display: none; position: absolute; z-index: 50; left: 24px; top: -4px; width: 220px; background: #1e293b; color: #f1f5f9; font-size: 12px; border-radius: 8px; padding: 8px 12px; line-height: 1.5; pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .tooltip-container:hover .tooltip-box { display: block; }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeInUp 0.4s ease; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;

function Tooltip({ text }) {
  return (
    <span className="tooltip-container ml-1 align-middle">
      <span className="inline-flex items-center justify-center w-4 h-4 rounded-full bg-blue-100 text-blue-600 text-xs font-bold cursor-help select-none border border-blue-200">?</span>
      <span className="tooltip-box">{text}</span>
    </span>
  );
}

function SliderInput({ label, value, onChange, min, max, step, unit, tooltip, displayValue, isPercent }) {
  const display = displayValue !== undefined ? displayValue : (isPercent ? (value * 100).toFixed(1) : value);
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <div className="mb-4">
      <div className="flex items-center justify-between mb-1">
        <label className="text-sm font-medium text-slate-700 flex items-center">
          {label}
          <Tooltip text={tooltip} />
        </label>
        <span className="text-sm font-bold text-blue-700 bg-blue-50 px-2 py-0.5 rounded-md border border-blue-100 min-w-[72px] text-right tabular-nums">
          {isPercent
            ? `${(value * 100).toFixed(1)}%`
            : unit === "円"
              ? `¥${Number(value).toLocaleString()}`
              : unit === "TWD/JPY"
                ? `${Number(value).toFixed(3)}`
                : `${Number(value).toLocaleString()} ${unit || ""}`}
        </span>
      </div>
      <div className="flex items-center gap-2">
        <input
          type="range"
          min={min} max={max} step={step}
          value={value}
          onChange={e => onChange(parseFloat(e.target.value))}
          className="flex-1"
          style={{ background: `linear-gradient(to right, #2563eb ${pct}%, #cbd5e1 ${pct}%)` }}
        />
        <input
          type="number"
          min={min} max={max} step={step}
          value={value}
          onChange={e => { const v = parseFloat(e.target.value); if (!isNaN(v)) onChange(Math.min(max, Math.max(min, v))); }}
          className="w-20 text-right text-sm border border-slate-200 rounded-md px-2 py-1 bg-white focus:outline-none focus:ring-2 focus:ring-blue-300 tabular-nums"
        />
      </div>
    </div>
  );
}

function CostBar({ segments, total }) {
  const colors = [
    "#1d4ed8", // メーカー原価
    "#3b82f6", // 輸出商社マージン
    "#06b6d4", // 国際物流費
    "#f59e0b", // 台湾関税
    "#f97316", // 台湾営業税
    "#ef4444", // 台湾輸入商社マージン
    "#dc2626", // 台湾小売マージン
  ];
  return (
    <div className="w-full rounded-lg overflow-hidden h-10 flex">
      {segments.map((seg, i) => {
        const pct = total > 0 ? (seg.value / total) * 100 : 0;
        return (
          <div
            key={i}
            title={`${seg.label}: ¥${seg.value.toFixed(0)} (${pct.toFixed(1)}%)`}
            style={{ width: `${pct}%`, background: colors[i] }}
            className="relative group transition-all duration-300 cursor-pointer hover:brightness-110"
          />
        );
      })}
    </div>
  );
}

function LegendRow({ label, jpyValue, twd, pct, color, isFirst }) {
  return (
    <div className={`flex items-center justify-between py-2 ${!isFirst ? "border-t border-slate-100" : ""}`}>
      <div className="flex items-center gap-2 min-w-0">
        <span className="w-3 h-3 rounded-sm flex-shrink-0" style={{ background: color }} />
        <span className="text-sm text-slate-700 truncate">{label}</span>
      </div>
      <div className="flex items-center gap-3 flex-shrink-0 ml-2">
        <span className="text-xs text-slate-500 tabular-nums">¥{jpyValue.toFixed(0)}</span>
        <span className="text-xs font-semibold text-slate-700 tabular-nums w-20 text-right">NT${twd.toFixed(0)}</span>
        <span className="text-xs text-slate-400 tabular-nums w-12 text-right">{pct.toFixed(1)}%</span>
      </div>
    </div>
  );
}

function StepRow({ step, label, jpyValue, isHighlight }) {
  return (
    <div className={`flex items-center justify-between py-1.5 px-3 rounded-lg ${isHighlight ? "bg-blue-50 border border-blue-100" : ""}`}>
      <div className="flex items-center gap-2">
        <span className="text-xs font-bold text-white bg-slate-400 rounded-full w-5 h-5 flex items-center justify-center flex-shrink-0">{step}</span>
        <span className="text-sm text-slate-600">{label}</span>
      </div>
      <span className={`text-sm font-semibold tabular-nums ${isHighlight ? "text-blue-700" : "text-slate-700"}`}>
        ¥{jpyValue.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 })}
      </span>
    </div>
  );
}

function App() {
  const [jpPrice, setJpPrice] = useState(1000);
  const [taxRate, setTaxRate] = useState(0.10);
  const [wholesaleRate, setWholesaleRate] = useState(0.60);
  const [exportMargin, setExportMargin] = useState(0.20);
  const [logistics, setLogistics] = useState(100);
  const [tariffRate, setTariffRate] = useState(0.30);
  const [importMargin, setImportMargin] = useState(0.20);
  const [retailMargin, setRetailMargin] = useState(0.40);
  const [fxRate, setFxRate] = useState(0.22);

  const calc = useMemo(() => {
    const mfgPrice     = jpPrice / (1 + taxRate) * wholesaleRate;
    const fobPrice     = mfgPrice / (1 - exportMargin);
    const cifPrice     = fobPrice + logistics;
    const tariff       = cifPrice * tariffRate;
    const vat          = (cifPrice + tariff) * 0.05;
    const importWhole  = (cifPrice + tariff + vat) / (1 - importMargin);
    const retailJPY    = importWhole / (1 - retailMargin);
    const retailTWD    = retailJPY * fxRate;
    const multiplier   = jpPrice > 0 ? retailTWD / (jpPrice * fxRate) : 0;

    const segments = [
      { label: "メーカー出荷価（原価）",   value: mfgPrice,                           twd: mfgPrice * fxRate },
      { label: "輸出商社マージン",          value: fobPrice - mfgPrice,                twd: (fobPrice - mfgPrice) * fxRate },
      { label: "国際物流費",               value: logistics,                           twd: logistics * fxRate },
      { label: "台湾関税",                 value: tariff,                              twd: tariff * fxRate },
      { label: "台湾営業税（5%）",          value: vat,                                twd: vat * fxRate },
      { label: "台湾輸入商社マージン",       value: importWhole - (cifPrice + tariff + vat), twd: (importWhole - (cifPrice + tariff + vat)) * fxRate },
      { label: "台湾小売マージン",          value: retailJPY - importWhole,            twd: (retailJPY - importWhole) * fxRate },
    ];

    return { mfgPrice, fobPrice, cifPrice, tariff, vat, importWhole, retailJPY, retailTWD, multiplier, segments };
  }, [jpPrice, taxRate, wholesaleRate, exportMargin, logistics, tariffRate, importMargin, retailMargin, fxRate]);

  const segColors = ["#1d4ed8","#3b82f6","#06b6d4","#f59e0b","#f97316","#ef4444","#dc2626"];

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-100 to-blue-50 py-6 px-4">
      {/* Header */}
      <div className="max-w-6xl mx-auto mb-6">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-lg font-bold shadow">🍱</div>
          <div>
            <h1 className="text-xl font-bold text-slate-800">食品輸出価格シミュレーター</h1>
            <p className="text-sm text-slate-500">日本 → 台湾　現地想定販売価格（TWD）を自動計算</p>
          </div>
        </div>
      </div>

      <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-5 gap-6">

        {/* ===== LEFT: Inputs ===== */}
        <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
          <h2 className="text-base font-bold text-slate-700 mb-5 flex items-center gap-2">
            <span className="w-2 h-5 bg-blue-600 rounded-full inline-block" />
            入力設定
          </h2>

          <div className="mb-5">
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">日本側コスト</p>
            <SliderInput label="日本の店頭価格（税込）" value={jpPrice} onChange={setJpPrice}
              min={100} max={10000} step={50} unit="円"
              tooltip="日本の小売店で消費者が購入する価格（税込）。すべての計算のベースとなります。" />
            <SliderInput label="日本の消費税率" value={taxRate} onChange={setTaxRate}
              min={0.01} max={0.15} step={0.01} isPercent
              tooltip="現行は一般食品10%、軽減税率（飲食料品）は8%。計算では税抜き価格を求めるために使用します。" />
            <SliderInput label="メーカー卸掛け率" value={wholesaleRate} onChange={setWholesaleRate}
              min={0.3} max={0.9} step={0.01} isPercent
              tooltip="日本の定価（税抜）に対してメーカーが卸す際の掛け率。0.6なら定価の60%で卸すことを意味します。一般的に0.5〜0.7程度。" />
          </div>

          <div className="mb-5">
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">輸出・物流</p>
            <SliderInput label="輸出商社の利益率" value={exportMargin} onChange={setExportMargin}
              min={0.05} max={0.50} step={0.01} isPercent
              tooltip="輸出を担う商社がFOB価格に乗せる利益率。通貨リスクや通関コスト等を含む。一般的に15〜25%程度。" />
            <SliderInput label="国際物流費（1個あたり）" value={logistics} onChange={setLogistics}
              min={0} max={2000} step={10} unit="円"
              tooltip="航空便や船便の送料・保険料をSKU1個あたりに換算した円建てコスト。商品重量や便種により大きく変動します。" />
          </div>

          <div className="mb-5">
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">台湾側コスト</p>
            <SliderInput label="台湾の関税率" value={tariffRate} onChange={setTariffRate}
              min={0} max={1.00} step={0.01} isPercent
              tooltip="台湾への食品輸入に課される関税率。品目によって異なり、菓子類は概ね20〜40%、加工食品は10〜40%程度。FTA締結により変動する場合あり。" />
            <SliderInput label="台湾輸入商社の利益率" value={importMargin} onChange={setImportMargin}
              min={0.05} max={0.60} step={0.01} isPercent
              tooltip="台湾側の輸入商社が小売業者に卸す際に乗せる利益率。現地の営業・保管・配送コストを含む。" />
            <SliderInput label="台湾小売店の利益率" value={retailMargin} onChange={setRetailMargin}
              min={0.10} max={0.70} step={0.01} isPercent
              tooltip="スーパーや百貨店などの小売店が設定する利益率（粗利率）。台湾のプレミアム系小売では30〜50%程度。" />
          </div>

          <div>
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">為替</p>
            <SliderInput label="為替レート（JPY→TWD）" value={fxRate} onChange={setFxRate}
              min={0.10} max={0.40} step={0.001} unit="TWD/JPY"
              tooltip="1円が何台湾ドル（TWD）になるかの換算レート。2024年実勢は0.20〜0.23程度。銀行レートと実勢レートの差に注意。" />
          </div>
        </div>

        {/* ===== RIGHT: Results ===== */}
        <div className="lg:col-span-3 flex flex-col gap-5">

          {/* Main Result Card */}
          <div className="bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl shadow-md p-6 text-white fade-in">
            <p className="text-sm font-medium text-blue-200 mb-1">台湾での想定販売価格</p>
            <div className="flex items-end gap-3 mb-3">
              <span className="text-5xl font-extrabold tabular-nums tracking-tight">
                NT${calc.retailTWD.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 })}
              </span>
            </div>
            <div className="flex items-center gap-4 flex-wrap">
              <div className="bg-white/15 rounded-xl px-4 py-2">
                <p className="text-xs text-blue-200">日本定価との比較</p>
                <p className="text-xl font-bold">
                  日本の <span className="text-yellow-300">{calc.multiplier.toFixed(2)}倍</span>
                </p>
              </div>
              <div className="bg-white/15 rounded-xl px-4 py-2">
                <p className="text-xs text-blue-200">円換算（台湾店頭）</p>
                <p className="text-xl font-bold tabular-nums">¥{calc.retailJPY.toLocaleString(undefined, {maximumFractionDigits:0})}</p>
              </div>
              <div className="bg-white/15 rounded-xl px-4 py-2">
                <p className="text-xs text-blue-200">日本定価（参考TWD）</p>
                <p className="text-xl font-bold tabular-nums">NT${(jpPrice * fxRate).toFixed(0)}</p>
              </div>
            </div>
          </div>

          {/* Cost Breakdown Bar */}
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
            <h3 className="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2">
              <span className="w-2 h-4 bg-blue-500 rounded-full inline-block" />
              コスト積み上げ（台湾店頭価格の内訳）
            </h3>
            <CostBar segments={calc.segments} total={calc.retailJPY} />
            <div className="mt-4 divide-y divide-slate-50">
              {calc.segments.map((seg, i) => (
                <LegendRow
                  key={i}
                  label={seg.label}
                  jpyValue={seg.value}
                  twd={seg.twd}
                  pct={calc.retailJPY > 0 ? (seg.value / calc.retailJPY) * 100 : 0}
                  color={segColors[i]}
                  isFirst={i === 0}
                />
              ))}
              <div className="flex items-center justify-between py-2 font-bold">
                <span className="text-sm text-slate-800">合計（台湾店頭価格）</span>
                <div className="flex items-center gap-3">
                  <span className="text-xs text-slate-500 tabular-nums">¥{calc.retailJPY.toFixed(0)}</span>
                  <span className="text-sm font-bold text-blue-700 tabular-nums w-20 text-right">NT${calc.retailTWD.toFixed(0)}</span>
                  <span className="text-xs text-slate-400 w-12 text-right">100%</span>
                </div>
              </div>
            </div>
          </div>

          {/* Step-by-step */}
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
            <h3 className="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2">
              <span className="w-2 h-4 bg-slate-400 rounded-full inline-block" />
              計算ステップ詳細
            </h3>
            <div className="space-y-1.5">
              <StepRow step="1" label="日本メーカー出荷価（税抜×卸掛け率）" jpyValue={calc.mfgPrice} />
              <StepRow step="2" label="輸出商社販売価格・FOB" jpyValue={calc.fobPrice} />
              <StepRow step="3" label="台湾輸入原価・CIF（FOB＋物流費）" jpyValue={calc.cifPrice} />
              <StepRow step="4" label="台湾関税額（CIF×関税率）" jpyValue={calc.tariff} />
              <StepRow step="5" label="台湾営業税（CIF＋関税）×5%" jpyValue={calc.vat} />
              <StepRow step="6" label="台湾輸入商社卸値" jpyValue={calc.importWhole} />
              <StepRow step="7" label="台湾店頭価格（円換算）" jpyValue={calc.retailJPY} isHighlight />
            </div>
            <div className="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between bg-blue-50 rounded-xl px-4 py-3">
              <span className="text-sm font-bold text-blue-800">最終結果（台湾ドル）</span>
              <span className="text-xl font-extrabold text-blue-700 tabular-nums">NT${calc.retailTWD.toLocaleString(undefined, {maximumFractionDigits:0})}</span>
            </div>
          </div>

        </div>
      </div>

      <p className="text-center text-xs text-slate-400 mt-8">※ 本シミュレーターは参考値です。実際の価格は市場状況・交渉条件・物流契約等により変動します。</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
